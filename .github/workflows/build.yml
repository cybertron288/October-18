name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Build universal binary
        run: |
          xcodebuild -project October18.xcodeproj \
            -scheme October18 \
            -configuration Release \
            -arch arm64 -arch x86_64 \
            clean build \
            SYMROOT="$PWD/Build"

      - name: Verify universal binary
        run: lipo -info Build/Release/October18.saver/Contents/MacOS/October18
